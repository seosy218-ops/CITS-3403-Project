{% extends "base.html" %}

{% block title %}TuneFeed — Listen{% endblock %}

{% block full_page %}
<div class="feed-wrapper" id="feed-wrapper">
  <a href="{{ url_for('discover') }}" class="feed-back-btn" title="Back to discover">
    <i class="bi bi-arrow-left"></i>
  </a>

  <button type="button" class="feed-player-fab" id="feed-player-fab" title="Inspect tune" aria-label="Inspect tune">
    <i class="bi bi-music-note-beamed"></i>
    <span class="feed-player-fab-text">Inspect Tune</span>
  </button>

  <div class="feed-scroll-container" id="feed-scroll">
    {% for idx in [1, 2, 3] %}
    <div class="feed-card" id="feed-card-{{ idx }}">
      <div class="feed-card-visual">
        <div class="feed-card-img feed-card-img-{{ idx }}"></div>
        <div class="feed-card-overlay"></div>
        <div class="feed-wave-shell"><div class="feed-wave-canvas"></div></div>
      </div>

      <div class="feed-side-panel">
        <div class="feed-producer">
          <a href="#" class="feed-producer-avatar-link"><div class="feed-producer-avatar">—</div></a>
          <div class="feed-producer-text">
            <span class="feed-producer-name">—</span>
            <span class="feed-producer-genre">—</span>
          </div>

          <button class="feed-ghost-btn feed-producer-info-btn"><i class="bi bi-person"></i> Info</button>
          <button class="btn-follow"><i class="bi bi-plus-circle"></i><span class="follow-label">Follow</span></button>
        </div>

        <div class="feed-beats-meta">
          <div class="feed-meta-item"><span class="feed-meta-label">BPM</span><span class="feed-meta-value">—</span></div>
          <div class="feed-meta-item"><span class="feed-meta-label">Key</span><span class="feed-meta-value">—</span></div>
        </div>

        <div class="feed-stats">
          <div class="feed-stat-item"><span class="feed-stat-icon"><i class="bi bi-play-circle"></i></span><span class="feed-stat-value">—</span><span class="feed-stat-label">plays</span></div>
          <div class="feed-stat-item"><span class="feed-stat-icon"><i class="bi bi-heart"></i></span><span class="feed-stat-value">—</span><span class="feed-stat-label">likes</span></div>
          <div class="feed-stat-item"><span class="feed-stat-icon"><i class="bi bi-chat-dots"></i></span><span class="feed-stat-value">—</span><span class="feed-stat-label">comments</span></div>
        </div>
      </div>

      <div class="feed-info-overlay">
        <h1 class="feed-title">—</h1>
        <p class="feed-description">—</p>

        <div class="feed-overlay-bottom">
          <div class="feed-prices">
            <div class="feed-price-heading">Purchase Details</div>
            <div class="feed-price-item"><span class="feed-price-label">Lease</span><span class="feed-price-value">—</span></div>
            <div class="feed-price-item"><span class="feed-price-label">Premium</span><span class="feed-price-value">—</span></div>
            <div class="feed-price-item"><span class="feed-price-label">Exclusive</span><span class="feed-price-value">—</span></div>
          </div>
          <div class="feed-actions">
            <button class="feed-ghost-btn feed-details-btn"><i class="bi bi-info-circle"></i> Details & Purchase</button>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.feed-wrapper {
  position: fixed;
  top: 62px;
  right: 0;
  left: 0;
  bottom: 0;
  background: var(--ts-bg);
  overflow: hidden;
  z-index: 20;
}

.feed-back-btn {
  position: fixed;
  top: 80px;
  left: 20px;
  z-index: 50;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(13, 13, 20, 0.9);
  border: 2px solid var(--ts-border);
  color: var(--ts-text-primary);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
}

.feed-player-fab {
  position: fixed;
  left: 50%;
  top: 24%;
  transform: translateX(-50%);
  z-index: 60;
  min-width: 182px;
  height: 54px;
  padding: 0 20px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.24);
  background: linear-gradient(180deg, rgba(30, 30, 40, 0.44) 0%, rgba(13, 13, 20, 0.56) 100%);
  color: var(--ts-text-primary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
}

.feed-player-fab-text {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.feed-scroll-container {
  width: 100%;
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.feed-card {
  position: relative;
  width: 100%;
  height: calc(100vh - 62px);
  min-height: 100svh;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a0a10, #161628);
  overflow: hidden;
}

.feed-card-visual {
  position: absolute;
  inset: 0;
}

.feed-card-img {
  position: absolute;
  inset: 0;
}

.feed-card-img-1 { background: linear-gradient(130deg, #1f1628 0%, #4f2a38 40%, #0e111a 100%); }
.feed-card-img-2 { background: linear-gradient(130deg, #101b24 0%, #2f4b54 42%, #10141d 100%); }
.feed-card-img-3 { background: linear-gradient(130deg, #1b1224 0%, #51305d 42%, #11131b 100%); }

.feed-card-overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 2%, rgba(0,0,0,0.44) 100%);
}

.feed-wave-shell {
  position: absolute;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: clamp(240px, 64vw, 980px);
  height: clamp(140px, 26vh, 320px);
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.02) 55%, rgba(0, 0, 0, 0.2) 100%);
}

.feed-wave-canvas { width: 100%; height: 100%; }

.feed-side-panel {
  position: absolute;
  right: 18px;
  bottom: 16px;
  width: 176px;
  z-index: 30;
  background: rgba(13,13,20,.74);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 14px;
  padding: 10px;
}

.feed-producer {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
}

.feed-producer-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(255,255,255,.08);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
}

.feed-producer-name { display: block; font-size: 11px; font-weight: 700; }
.feed-producer-genre { display: block; font-size: 10px; color: var(--ts-text-muted); }

.feed-producer-info-btn,
.btn-follow {
  grid-column: 1 / -1;
  width: 100%;
  font-size: 11px;
}

.btn-follow {
  border: 1px solid var(--ts-orange-border);
  background: var(--ts-orange-dim);
  color: var(--ts-orange-light);
  border-radius: 10px;
  padding: 7px 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.feed-beats-meta {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}

.feed-meta-item {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px;
  padding: 5px;
  text-align: center;
}

.feed-meta-label {
  display: block;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--ts-text-muted);
}

.feed-meta-value {
  display: block;
  font-size: 11px;
  font-weight: 700;
}

.feed-stats { display: grid; gap: 8px; }
.feed-stat-item { display: flex; gap: 6px; align-items: center; font-size: 10px; }
.feed-stat-icon { color: var(--ts-orange-light); }
.feed-stat-value { font-weight: 700; }
.feed-stat-label { color: var(--ts-text-muted); }

.feed-info-overlay {
  position: absolute;
  left: 20px;
  right: 210px;
  bottom: 18px;
  z-index: 25;
  background: rgba(13,13,20,.68);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 16px;
  padding: 14px;
}

.feed-title { font-size: clamp(1.3rem, 3.2vw, 2.2rem); margin-bottom: 6px; }
.feed-description { color: var(--ts-text-secondary); font-size: 13px; line-height: 1.45; margin-bottom: 10px; }

.feed-overlay-bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
}

.feed-prices { display: grid; gap: 4px; }
.feed-price-heading { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--ts-text-muted); margin-bottom: 2px; }
.feed-price-item { display: flex; gap: 7px; align-items: center; font-size: 12px; }
.feed-price-label { color: var(--ts-text-muted); }
.feed-price-value { color: var(--ts-orange-light); font-weight: 700; }

.feed-ghost-btn {
  border: 1px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.08);
  color: var(--ts-text-primary);
  border-radius: 10px;
  padding: 9px 12px;
  font-size: 12px;
}

.feed-details-btn { width: auto; min-width: 146px; }
</style>
{% endblock %}
