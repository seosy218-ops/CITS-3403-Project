<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TuneFeed{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/tunefeed.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  <header class="top-nav">
    <a href="{{ url_for('discover') }}" class="brand">TuneFeed</a>
    <nav class="top-nav-links">
      <a href="{{ url_for('discover') }}">Discover</a>
      <a href="{{ url_for('login') }}">Sign In</a>
      <a href="{{ url_for('register') }}">Join</a>
    </nav>
  </header>

  {% block full_page %}{% endblock %}
</body>
</html>
